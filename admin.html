<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Админка D&D</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
    <div id="admin-panel">
        <h2>Добавить достижение</h2>
        <div id="loading">Проверка прав доступа...</div>
        <div id="adminContent" style="display:none;">
            <label>Выберите игрока:</label>
            <select id="playerSelect"></select>
            <input type="text" id="title" placeholder="Название достижения" />
            <input type="file" id="imageFile" accept="image/*" />
            <button id="submitBtn">Опубликовать</button>
            <div id="message"></div>
        </div>
        <div id="errorMsg" style="display:none; color:red;"></div>
    </div>
    <script>
        // ---------- НАСТРОЙКИ (УЖЕ ЗАПОЛНЕНЫ) ----------
        const APP_ID = 54508090;
        const GROUP_ID = 236712001;      // положительный ID группы
        const ALBUM_ID = 310403391;      // ID альбома
        const STORAGE_KEY = 'dnd_achievements';
        // ----------------------------------------------

        let communityToken = null;

        vkBridge.send('VKWebAppInit').then(() => {
            // Запрашиваем токен сообщества
            return vkBridge.send('VKWebAppGetCommunityToken', {
                app_id: APP_ID,
                group_id: GROUP_ID,
                scope: 'photos,groups,storage'
            });
        }).then(data => {
            console.log('Токен сообщества получен:', data);
            communityToken = data.access_token;
            // После получения токена загружаем участников
            return loadGroupMembers();
        }).then(() => {
            // Скрываем загрузку, показываем форму
            document.getElementById('loading').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
        }).catch(err => {
            console.error('Ошибка:', err);
            document.getElementById('loading').innerHTML = 'Не удалось получить токен сообщества. Убедитесь, что вы администратор группы и приложение добавлено в сообщество.';
            document.getElementById('errorMsg').innerText = 'Ошибка: ' + (err.error_type || err.message);
            document.getElementById('errorMsg').style.display = 'block';
        });

        // Загрузка участников группы (использует токен сообщества)
        async function loadGroupMembers() {
            try {
                const response = await vkBridge.send('VKWebAppCallAPIMethod', {
                    method: 'groups.getMembers',
                    params: {
                        group_id: GROUP_ID,
                        fields: 'first_name,last_name',
                        count: 200,
                        access_token: communityToken   // обязательно передаём токен
                    }
                });
                const members = response.response.items;
                const select = document.getElementById('playerSelect');
                select.innerHTML = '';
                members.forEach(m => {
                    const option = document.createElement('option');
                    option.value = m.id;
                    option.textContent = `${m.first_name} ${m.last_name}`;
                    select.appendChild(option);
                });
            } catch (e) {
                console.error('Ошибка загрузки участников:', e);
                throw e;
            }
        }

        // Публикация достижения
        document.getElementById('submitBtn').onclick = async () => {
            const title = document.getElementById('title').value;
            const playerId = document.getElementById('playerSelect').value;
            const playerName = document.getElementById('playerSelect').options[document.getElementById('playerSelect').selectedIndex].text;
            const file = document.getElementById('imageFile').files[0];

            if (!title || !file) {
                alert('Заполните название и выберите картинку');
                return;
            }

            try {
                // 1. Получаем сервер для загрузки фото
                const uploadServerRes = await vkBridge.send('VKWebAppCallAPIMethod', {
                    method: 'photos.getUploadServer',
                    params: {
                        group_id: GROUP_ID,
                        album_id: ALBUM_ID,
                        access_token: communityToken
                    }
                });
                const uploadUrl = uploadServerRes.response.upload_url;

                // 2. Загружаем файл
                const formData = new FormData();
                formData.append('file', file);
                const uploadResponse = await fetch(uploadUrl, { method: 'POST', body: formData });
                const uploadData = await uploadResponse.json();

                // 3. Сохраняем фото в альбоме
                const saveRes = await vkBridge.send('VKWebAppCallAPIMethod', {
                    method: 'photos.save',
                    params: {
                        group_id: GROUP_ID,
                        album_id: ALBUM_ID,
                        server: uploadData.server,
                        photos_list: uploadData.photos_list,
                        hash: uploadData.hash,
                        access_token: communityToken
                    }
                });
                const photo = saveRes.response[0];
                const photoUrl = photo.sizes[photo.sizes.length-1].url;

                // 4. Получаем текущие достижения из Storage (токен сообщества)
                const storageRes = await vkBridge.send('VKWebAppCallAPIMethod', {
                    method: 'storage.get',
                    params: {
                        key: STORAGE_KEY,
                        access_token: communityToken
                    }
                });
                let achievements = [];
                if (storageRes.response && storageRes.response.value) {
                    achievements = JSON.parse(storageRes.response.value);
                }

                // 5. Добавляем новое
                achievements.push({
                    title: title,
                    playerName: playerName,
                    playerId: parseInt(playerId),
                    photoUrl: photoUrl,
                    timestamp: Date.now()
                });

                // 6. Сохраняем обратно
                await vkBridge.send('VKWebAppCallAPIMethod', {
                    method: 'storage.set',
                    params: {
                        key: STORAGE_KEY,
                        value: JSON.stringify(achievements),
                        access_token: communityToken
                    }
                });

                document.getElementById('message').innerText = '✅ Достижение опубликовано!';
                document.getElementById('title').value = '';
                document.getElementById('imageFile').value = '';
            } catch (err) {
                console.error(err);
                alert('Ошибка: ' + (err.message || JSON.stringify(err)));
            }
        };
    </script>
</body>
</html>
