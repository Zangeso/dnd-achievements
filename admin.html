<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Админка D&D</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
    <div id="admin-panel">
        <h2>Добавить достижение</h2>
        <div id="loading">Проверка прав доступа...</div>
        <div id="adminContent" style="display:none;">
            <label>Выберите игрока:</label>
            <select id="playerSelect"></select>
            <input type="text" id="title" placeholder="Название достижения" />
            <input type="file" id="imageFile" accept="image/*" />
            <button id="submitBtn">Опубликовать</button>
            <div id="message"></div>
        </div>
        <div id="errorMsg" style="display:none; color:red;">Доступ только для администраторов группы.</div>
    </div>
    <script>
        // ---------- НАСТРОЙКИ (ЗАМЕНИТЕ НА СВОИ) ----------
        const APP_ID = 54508090;
const GROUP_ID = 236712001;
const ALBUM_ID = 310403391;        // ID альбома
        const STORAGE_KEY = 'dnd_achievements';
        // -------------------------------------------------

        vkBridge.send('VKWebAppInit');

        // Запрашиваем токен с нужными правами
        vkBridge.send('VKWebAppGetAuthToken', {
            app_id: APP_ID,
            scope: 'photos,storage,groups'
        }).then(async () => {
            // Проверяем, является ли пользователь администратором группы
            const isAdmin = await checkIfAdmin();
            if (isAdmin) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadGroupMembers();  // загружаем список участников
            } else {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorMsg').style.display = 'block';
            }
        }).catch(err => {
            console.error('Ошибка получения токена', err);
            document.getElementById('loading').innerText = 'Не удалось получить разрешения. Возможно, вы отклонили запрос. Перезагрузите страницу.';
        });

        // Проверка: является ли текущий пользователь администратором группы
        async function checkIfAdmin() {
            try {
                // Получаем информацию о текущем пользователе
                const user = await vkBridge.send('VKWebAppGetUserInfo');
                // Вызываем groups.isMember с extended=1
                const response = await vkBridge.send('VKWebAppCallAPIMethod', {
                    method: 'groups.isMember',
                    params: {
                        group_id: GROUP_ID,
                        user_id: user.id,
                        extended: 1
                    }
                });
                // response.response — объект с полями member, can_invite, etc.
                // Нам нужно, чтобы member было true и role была не 'member' (т.е. администратор, редактор и т.п.)
                const data = response.response;
                if (data.member && data.role && data.role !== 'member') {
                    return true;
                } else {
                    return false;
                }
            } catch (e) {
                console.error('Ошибка проверки администратора', e);
                return false;
            }
        }

        // Загрузка списка участников группы (для выбора игрока)
        async function loadGroupMembers() {
            try {
                const response = await vkBridge.send('VKWebAppCallAPIMethod', {
                    method: 'groups.getMembers',
                    params: {
                        group_id: GROUP_ID,
                        fields: 'first_name,last_name',
                        count: 200
                    }
                });
                const members = response.response.items;
                const select = document.getElementById('playerSelect');
                select.innerHTML = '';
                members.forEach(m => {
                    const option = document.createElement('option');
                    option.value = m.id;
                    option.textContent = `${m.first_name} ${m.last_name}`;
                    select.appendChild(option);
                });
            } catch (e) {
                console.error('Ошибка загрузки участников', e);
                alert('Не удалось загрузить список игроков. Убедитесь, что приложение имеет доступ к группе.');
            }
        }

        // Публикация достижения
        document.getElementById('submitBtn').onclick = async () => {
            const title = document.getElementById('title').value;
            const playerId = document.getElementById('playerSelect').value;
            const playerName = document.getElementById('playerSelect').options[document.getElementById('playerSelect').selectedIndex].text;
            const file = document.getElementById('imageFile').files[0];

            if (!title || !file) {
                alert('Заполните название и выберите картинку');
                return;
            }

            try {
                // 1. Загружаем фото в альбом группы
                const uploadServerRes = await vkBridge.send('VKWebAppCallAPIMethod', {
                    method: 'photos.getUploadServer',
                    params: { group_id: GROUP_ID, album_id: ALBUM_ID }
                });
                const uploadUrl = uploadServerRes.response.upload_url;

                const formData = new FormData();
                formData.append('file', file);
                const uploadResponse = await fetch(uploadUrl, {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadResponse.json();

                const saveRes = await vkBridge.send('VKWebAppCallAPIMethod', {
                    method: 'photos.save',
                    params: {
                        group_id: GROUP_ID,
                        album_id: ALBUM_ID,
                        server: uploadData.server,
                        photos_list: uploadData.photos_list,
                        hash: uploadData.hash
                    }
                });
                const photo = saveRes.response[0];
                const photoUrl = photo.sizes[photo.sizes.length-1].url;

                // 2. Получаем текущие достижения из Storage
                const storageRes = await vkBridge.send('VKWebAppStorageGet', { keys: [STORAGE_KEY] });
                let achievements = [];
                if (storageRes.keys[0] && storageRes.keys[0].value) {
                    achievements = JSON.parse(storageRes.keys[0].value);
                }

                // 3. Добавляем новое
                achievements.push({
                    title: title,
                    playerName: playerName,
                    playerId: parseInt(playerId),
                    photoUrl: photoUrl,
                    timestamp: Date.now()
                });

                // 4. Сохраняем обратно
                await vkBridge.send('VKWebAppStorageSet', {
                    key: STORAGE_KEY,
                    value: JSON.stringify(achievements)
                });

                document.getElementById('message').innerText = '✅ Достижение опубликовано!';
                document.getElementById('title').value = '';
                document.getElementById('imageFile').value = '';
            } catch (err) {
                console.error(err);
                alert('Ошибка: ' + (err.message || err));
            }
        };
    </script>
</body>
</html>
