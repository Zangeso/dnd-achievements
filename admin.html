<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Админка D&D</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
    <div id="admin-panel">
        <h2>Добавить достижение</h2>
        <div id="loading">Проверка прав доступа...</div>
        <div id="adminContent" style="display:none;">
            <label>Выберите игрока:</label>
            <select id="playerSelect"></select>
            <input type="text" id="title" placeholder="Название достижения" />
            <input type="file" id="imageFile" accept="image/*" />
            <button id="submitBtn">Опубликовать</button>
            <div id="message"></div>
        </div>
        <div id="errorMsg" style="display:none; color:red; margin-top:10px;"></div>
        <div id="manualPlayers" style="display:none; margin-top:10px;">
            <label>Ручной ввод игроков (если список не загрузился):</label>
            <textarea id="manualList" rows="3" placeholder='[{"name":"Алексей","id":123456789},{"name":"Мария","id":987654321}]'></textarea>
            <button id="useManualBtn">Использовать этот список</button>
        </div>
    </div>
    <script>
        // ---------- НАСТРОЙКИ (ВАШИ) ----------
        const APP_ID = 54508090;
        const GROUP_ID = 236712001;
        const ALBUM_ID = 310403391;
        const STORAGE_KEY = 'dnd_achievements';
        // ------------------------------------

        // Проверяем, что мы внутри VK
        if (!window.vkBridge) {
            document.getElementById('loading').innerHTML = 'Ошибка: приложение запущено вне VK. Откройте его через группу или https://vk.com/app54508090';
        } else {
            vkBridge.send('VKWebAppInit');
        }

        // Запрашиваем токен только для photos и storage (groups не обязателен)
        vkBridge.send('VKWebAppGetAuthToken', {
            app_id: APP_ID,
            scope: 'photos,storage'
        }).then(() => {
            console.log('Токен photos+storage получен');
            // Далее пытаемся загрузить участников, но если не получится — покажем ручной ввод
            loadGroupMembersWithFallback();
        }).catch(err => {
            console.error('Ошибка получения токена:', err);
            document.getElementById('loading').innerHTML = 'Не удалось получить разрешения. Перезагрузите страницу и разрешите доступ. Если ошибка повторяется, используйте ручной ввод игроков.';
            // Всё равно показываем ручной ввод, чтобы можно было добавить достижение
            showManualInputFallback();
        });

        async function loadGroupMembersWithFallback() {
            try {
                // Пытаемся получить участников группы (нужен groups, но если нет прав, будет ошибка)
                const response = await vkBridge.send('VKWebAppCallAPIMethod', {
                    method: 'groups.getMembers',
                    params: {
                        group_id: GROUP_ID,
                        fields: 'first_name,last_name',
                        count: 200
                    }
                });
                const members = response.response.items;
                if (members && members.length) {
                    const select = document.getElementById('playerSelect');
                    select.innerHTML = '';
                    members.forEach(m => {
                        const option = document.createElement('option');
                        option.value = m.id;
                        option.textContent = `${m.first_name} ${m.last_name}`;
                        select.appendChild(option);
                    });
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('adminContent').style.display = 'block';
                    document.getElementById('manualPlayers').style.display = 'none';
                    return;
                }
                throw new Error('Список участников пуст');
            } catch (e) {
                console.error('Не удалось загрузить участников:', e);
                showManualInputFallback();
            }
        }

        function showManualInputFallback() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('manualPlayers').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('errorMsg').innerText = 'Автоматическая загрузка участников не удалась. Введите список игроков вручную (JSON). После этого форма станет доступна.';
            // Предзаполняем примером
            document.getElementById('manualList').value = JSON.stringify([
                { name: "Алексей", id: 162536789 },  // ваш ID для примера
                { name: "Другой игрок", id: 987654321 }
            ], null, 2);
        }

        // Обработка ручного списка
        document.getElementById('useManualBtn').onclick = () => {
            try {
                const manualText = document.getElementById('manualList').value;
                const players = JSON.parse(manualText);
                if (!Array.isArray(players)) throw new Error('Не массив');
                const select = document.getElementById('playerSelect');
                select.innerHTML = '';
                players.forEach(p => {
                    const option = document.createElement('option');
                    option.value = p.id;
                    option.textContent = p.name;
                    select.appendChild(option);
                });
                document.getElementById('manualPlayers').style.display = 'none';
                document.getElementById('errorMsg').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
            } catch (e) {
                alert('Ошибка в формате JSON. Используйте формат: [{"name":"Имя","id":123}]');
            }
        };

        // Публикация достижения
        document.getElementById('submitBtn').onclick = async () => {
            const title = document.getElementById('title').value;
            const playerId = document.getElementById('playerSelect').value;
            const playerName = document.getElementById('playerSelect').options[document.getElementById('playerSelect').selectedIndex].text;
            const file = document.getElementById('imageFile').files[0];

            if (!title || !file) {
                alert('Заполните название и выберите картинку');
                return;
            }

            try {
                // 1. Загружаем фото в альбом группы
                const uploadServerRes = await vkBridge.send('VKWebAppCallAPIMethod', {
                    method: 'photos.getUploadServer',
                    params: { group_id: GROUP_ID, album_id: ALBUM_ID }
                });
                const uploadUrl = uploadServerRes.response.upload_url;

                const formData = new FormData();
                formData.append('file', file);
                const uploadResponse = await fetch(uploadUrl, {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadResponse.json();

                const saveRes = await vkBridge.send('VKWebAppCallAPIMethod', {
                    method: 'photos.save',
                    params: {
                        group_id: GROUP_ID,
                        album_id: ALBUM_ID,
                        server: uploadData.server,
                        photos_list: uploadData.photos_list,
                        hash: uploadData.hash
                    }
                });
                const photo = saveRes.response[0];
                const photoUrl = photo.sizes[photo.sizes.length-1].url;

                // 2. Получаем текущие достижения из Storage
                const storageRes = await vkBridge.send('VKWebAppStorageGet', { keys: [STORAGE_KEY] });
                let achievements = storageRes.keys[0]?.value ? JSON.parse(storageRes.keys[0].value) : [];

                // 3. Добавляем новое
                achievements.push({
                    title: title,
                    playerName: playerName,
                    playerId: parseInt(playerId),
                    photoUrl: photoUrl,
                    timestamp: Date.now()
                });

                // 4. Сохраняем обратно
                await vkBridge.send('VKWebAppStorageSet', {
                    key: STORAGE_KEY,
                    value: JSON.stringify(achievements)
                });

                document.getElementById('message').innerText = '✅ Достижение опубликовано!';
                document.getElementById('title').value = '';
                document.getElementById('imageFile').value = '';
            } catch (err) {
                console.error(err);
                alert('Ошибка: ' + (err.message || err));
            }
        };
    </script>
</body>
</html>
