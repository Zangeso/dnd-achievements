<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Админка D&D</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="admin-panel">
        <h2>Добавить достижение</h2>
        <div id="loading">Проверка прав доступа...</div>
        <div id="adminContent" style="display:none;">
            <label>Выберите игрока:</label>
            <select id="playerSelect"></select>
            <input type="text" id="title" placeholder="Название достижения" />
            <input type="file" id="imageFile" accept="image/*" />
            <button id="submitBtn">Опубликовать</button>
            <div id="message"></div>
        </div>
        <div id="errorMsg" style="display:none; color:#ff8888;"></div>
    </div>
    <script>
        // Данные Supabase
        const SUPABASE_URL = 'https://jrwgibmbjaoogsdnukzi.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UjoyHMlGvIvQMxKTENAUMQ_OE3GtvON';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const GROUP_ID = 236712001;          // ID вашей группы (положительный)
        const APP_ID = 54508090;             // ID вашего VK приложения

        let communityToken = null;
        let currentUserId = null;

        vkBridge.send('VKWebAppInit').then(() => {
            return vkBridge.send('VKWebAppGetUserInfo');
        }).then(user => {
            currentUserId = user.id;
            return supabaseClient.rpc('set_user_id', { user_id: currentUserId });
        }).then(() => {
            return vkBridge.send('VKWebAppGetCommunityToken', {
                app_id: APP_ID,
                group_id: GROUP_ID,
                scope: 'groups'
            });
        }).then(data => {
            communityToken = data.access_token;
            return loadGroupMembers();
        }).then(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
        }).catch(err => {
            console.error(err);
            document.getElementById('loading').innerHTML = 'Не удалось получить доступ. Убедитесь, что вы администратор группы.';
            document.getElementById('errorMsg').innerText = 'Ошибка: ' + (err.error_type || err.message);
            document.getElementById('errorMsg').style.display = 'block';
        });

        async function loadGroupMembers() {
            const response = await vkBridge.send('VKWebAppCallAPIMethod', {
                method: 'groups.getMembers',
                params: {
                    group_id: GROUP_ID,
                    fields: 'first_name,last_name',
                    count: 200,
                    access_token: communityToken
                }
            });
            const members = response.response.items;
            const select = document.getElementById('playerSelect');
            select.innerHTML = '';
            members.forEach(m => {
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = `${m.first_name} ${m.last_name}`;
                select.appendChild(option);
            });
        }

        async function uploadImage(file) {
            const fileName = `${Date.now()}_${file.name}`;
            const { data, error } = await supabaseClient.storage
                .from('achievements')
                .upload(fileName, file);
            if (error) throw error;
            const { data: urlData } = supabaseClient.storage
                .from('achievements')
                .getPublicUrl(fileName);
            return urlData.publicUrl;
        }

        document.getElementById('submitBtn').onclick = async () => {
            const title = document.getElementById('title').value;
            const playerId = document.getElementById('playerSelect').value;
            const playerName = document.getElementById('playerSelect').options[document.getElementById('playerSelect').selectedIndex].text;
            const file = document.getElementById('imageFile').files[0];

            if (!title || !file) {
                alert('Заполните название и выберите картинку');
                return;
            }

            try {
                const imageUrl = await uploadImage(file);
                const { error } = await supabaseClient
                    .from('achievements')
                    .insert([{
                        title,
                        player_name: playerName,
                        player_vk_id: parseInt(playerId),
                        image_url: imageUrl
                    }]);
                if (error) throw error;
                document.getElementById('message').innerText = '✅ Достижение опубликовано!';
                document.getElementById('title').value = '';
                document.getElementById('imageFile').value = '';
            } catch (err) {
                console.error(err);
                alert('Ошибка: ' + err.message);
            }
        };
    </script>
</body>
</html>
