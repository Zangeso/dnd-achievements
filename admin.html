<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Админка D&D</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
</head>
<body>
    <div id="admin-panel">
        <button id="backToMain">← Вернуться к достижениям</button>
        <h2>Добавить сессию с достижениями</h2>
        <div id="loading">Инициализация...</div>
        <div id="adminContent" style="display:none;">
            <!-- Форма сессии -->
            <div class="admin-section">
                <h3>Информация о сессии</h3>
                <div class="form-row">
                    <label>Дата сессии:</label>
                    <input type="date" id="sessionDate" required>
                </div>
                <div class="form-row">
                    <label>Название (необязательно):</label>
                    <input type="text" id="sessionTitle" placeholder="Например: Битва с драконом">
                </div>
            </div>

            <!-- Блоки достижений -->
            <div class="admin-section">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="margin:0">Достижения</h3>
                    <div id="blocksCounter">0 / 8</div>
                </div>
                <div id="achievementsContainer"></div>
                <button id="addAchievementBtn" class="secondary">+ Добавить достижение</button>
            </div>

            <button id="submitBtn">Опубликовать сессию</button>
            <div id="message"></div>
        </div>
        <div id="errorMsg" style="display:none;"></div>
    </div>

    <!-- Модальное окно для кропа -->
    <div id="cropModal" class="modal">
        <div class="modal-content">
            <img id="cropImage" src="" alt="Crop">
            <div class="modal-buttons">
                <button id="cropConfirmBtn">Обрезать и загрузить</button>
                <button id="cropCancelBtn">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jrwgibmbjaoogsdnukzi.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UjoyHMlGvIvQMxKTENAUMQ_OE3GtvON';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const ADMIN_VK_ID = 162536789;
        const GROUP_ID = 236712001;
        const APP_ID = 54509223;

        let userToken = null;
        let currentUserId = null;
        let membersList = []; // список участников {id, name, avatar}
        let achievementsBlocks = []; // храним данные каждого блока: { playerId, playerName, playerAvatar, text, imageUrl }
        let nextBlockId = 0; // уникальный идентификатор для DOM

        // Cropper vars
        let cropper = null;
        let currentFile = null;
        let currentBlockId = null;

        vkBridge.send('VKWebAppInit').then(() => {
            return vkBridge.send('VKWebAppGetUserInfo');
        }).then(user => {
            currentUserId = user.id;
            if (currentUserId !== ADMIN_VK_ID) {
                document.getElementById('loading').innerHTML = 'Доступ запрещён. Вы не администратор.';
                return;
            }
            return supabaseClient.rpc('set_user_id', { user_id: currentUserId });
        }).then(() => {
            return vkBridge.send('VKWebAppGetAuthToken', {
                app_id: APP_ID,
                scope: 'groups'
            });
        }).then(data => {
            userToken = data.access_token;
            console.log('Токен получен');
            return loadGroupMembers();
        }).then(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            // Инициализируем один блок достижения по умолчанию
            addAchievementBlock();
            updateCounter();
        }).catch(err => {
            console.error('Ошибка:', err);
            document.getElementById('loading').innerHTML = 'Не удалось загрузить участников.';
            document.getElementById('errorMsg').innerText = 'Ошибка: ' + (err.error_type || err.message);
            document.getElementById('errorMsg').style.display = 'block';
        });

        async function loadGroupMembers() {
            const response = await vkBridge.send('VKWebAppCallAPIMethod', {
                method: 'groups.getMembers',
                params: {
                    group_id: GROUP_ID,
                    fields: 'first_name,last_name,photo_50',
                    count: 200,
                    access_token: userToken,
                    v: '5.199'
                }
            });
            const members = response.response.items;
            membersList = members.map(m => ({
                id: m.id,
                name: `${m.first_name} ${m.last_name}`,
                avatar: m.photo_50 || ''
            }));
        }

        function addAchievementBlock() {
            if (achievementsBlocks.length >= 8) {
                alert('Максимум 8 достижений на сессию');
                return;
            }
            const blockId = nextBlockId++;
            const newBlock = {
                id: blockId,
                playerId: '',
                playerName: '',
                playerAvatar: '',
                text: '',
                imageUrl: null
            };
            achievementsBlocks.push(newBlock);
            renderAchievementBlock(blockId);
            updateCounter();
        }

        function removeAchievementBlock(blockId) {
            if (achievementsBlocks.length <= 1) {
                alert('Должно быть хотя бы одно достижение');
                return;
            }
            const index = achievementsBlocks.findIndex(b => b.id === blockId);
            if (index !== -1) {
                achievementsBlocks.splice(index, 1);
                renderAllBlocks();
                updateCounter();
            }
        }

        function updateBlockData(blockId, field, value) {
            const block = achievementsBlocks.find(b => b.id === blockId);
            if (block) {
                block[field] = value;
            }
        }

        function renderAllBlocks() {
            const container = document.getElementById('achievementsContainer');
            container.innerHTML = '';
            achievementsBlocks.forEach(block => {
                renderAchievementBlock(block.id);
            });
        }

        function renderAchievementBlock(blockId) {
            const block = achievementsBlocks.find(b => b.id === blockId);
            if (!block) return;
            const container = document.getElementById('achievementsContainer');
            const existing = document.getElementById(`block-${blockId}`);
            if (existing) {
                // Обновляем существующий блок (пересоздадим проще)
                existing.remove();
            }
            const div = document.createElement('div');
            div.id = `block-${blockId}`;
            div.className = 'achievement-block';
            div.innerHTML = `
                <button class="remove-btn" data-id="${blockId}">×</button>
                <div class="form-row">
                    <label>Игрок:</label>
                    <select class="player-select" data-id="${blockId}">
                        <option value="">-- Выберите игрока --</option>
                        ${membersList.map(m => `<option value="${m.id}" data-avatar="${m.avatar}" ${block.playerId == m.id ? 'selected' : ''}>${m.name}</option>`).join('')}
                    </select>
                </div>
                <div class="form-row">
                    <label>Текст достижения:</label>
                    <input type="text" class="achievement-text" data-id="${blockId}" value="${escapeHtml(block.text)}" placeholder="Например: Убил дракона">
                </div>
                <div class="form-row">
                    <label>Картинка:</label>
                    <input type="file" class="image-file" data-id="${blockId}" accept="image/*">
                    <div class="image-preview" data-id="${blockId}">
                        ${block.imageUrl ? `<img src="${block.imageUrl}" class="preview-img">` : ''}
                    </div>
                </div>
            `;
            container.appendChild(div);

            // Обработчики
            div.querySelector('.remove-btn').addEventListener('click', () => removeAchievementBlock(blockId));
            const playerSelect = div.querySelector('.player-select');
            playerSelect.addEventListener('change', (e) => {
                const selected = e.target.options[e.target.selectedIndex];
                updateBlockData(blockId, 'playerId', e.target.value);
                updateBlockData(blockId, 'playerName', selected.text);
                updateBlockData(blockId, 'playerAvatar', selected.getAttribute('data-avatar') || '');
            });
            const textInput = div.querySelector('.achievement-text');
            textInput.addEventListener('input', (e) => updateBlockData(blockId, 'text', e.target.value));
            const fileInput = div.querySelector('.image-file');
            fileInput.addEventListener('change', (e) => handleImageSelect(blockId, e.target.files[0]));
        }

        function updateCounter() {
            const count = achievementsBlocks.length;
            document.getElementById('blocksCounter').innerText = `${count} / 8`;
            const addBtn = document.getElementById('addAchievementBtn');
            if (addBtn) addBtn.disabled = (count >= 8);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Cropper logic
        function handleImageSelect(blockId, file) {
            if (!file) return;
            currentBlockId = blockId;
            currentFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('cropImage');
                img.src = e.target.result;
                const modal = document.getElementById('cropModal');
                modal.style.display = 'flex';
                if (cropper) cropper.destroy();
                cropper = new Cropper(img, {
                    aspectRatio: 1 / 1,
                    viewMode: 1,
                    autoCropArea: 1,
                    background: false
                });
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('cropConfirmBtn').onclick = async () => {
            if (!cropper) return;
            const canvas = cropper.getCroppedCanvas();
            if (!canvas) return;
            const croppedBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
            const croppedFile = new File([croppedBlob], currentFile.name, { type: 'image/jpeg' });
            const imageUrl = await uploadCroppedImage(croppedFile);
            if (imageUrl) {
                const block = achievementsBlocks.find(b => b.id === currentBlockId);
                if (block) {
                    block.imageUrl = imageUrl;
                    // обновляем превью
                    const previewDiv = document.querySelector(`.image-preview[data-id="${currentBlockId}"]`);
                    if (previewDiv) {
                        previewDiv.innerHTML = `<img src="${imageUrl}" class="preview-img">`;
                    }
                }
            }
            document.getElementById('cropModal').style.display = 'none';
            if (cropper) cropper.destroy();
            cropper = null;
            currentBlockId = null;
            currentFile = null;
        };

        document.getElementById('cropCancelBtn').onclick = () => {
            document.getElementById('cropModal').style.display = 'none';
            if (cropper) cropper.destroy();
            cropper = null;
            currentBlockId = null;
            currentFile = null;
        };

        async function uploadCroppedImage(file) {
            const fileName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
            const { data, error } = await supabaseClient.storage
                .from('achievements')
                .upload(fileName, file);
            if (error) {
                console.error('Ошибка загрузки:', error);
                alert('Ошибка загрузки картинки');
                return null;
            }
            const { data: urlData } = supabaseClient.storage
                .from('achievements')
                .getPublicUrl(fileName);
            return urlData.publicUrl;
        }

        document.getElementById('submitBtn').onclick = async () => {
            const sessionDate = document.getElementById('sessionDate').value;
            const sessionTitle = document.getElementById('sessionTitle').value.trim();
            if (!sessionDate) {
                alert('Укажите дату сессии');
                return;
            }
            // Проверяем, что все блоки заполнены
            for (let i = 0; i < achievementsBlocks.length; i++) {
                const block = achievementsBlocks[i];
                if (!block.playerId || !block.text || !block.imageUrl) {
                    alert(`Заполните все поля для достижения ${i+1}`);
                    return;
                }
            }

            try {
                // 1. Создаём сессию
                const { data: session, error: sessionError } = await supabaseClient
                    .from('sessions')
                    .insert([{
                        title: sessionTitle || `Сессия ${new Date(sessionDate).toLocaleDateString('ru-RU')}`,
                        session_date: sessionDate
                    }])
                    .select()
                    .single();
                if (sessionError) throw sessionError;

                // 2. Вставляем достижения
                const achievementsToInsert = achievementsBlocks.map((block, idx) => ({
                    session_id: session.id,
                    player_name: block.playerName,
                    player_vk_id: parseInt(block.playerId),
                    player_avatar: block.playerAvatar,
                    achievement_text: block.text,
                    image_url: block.imageUrl,
                    order: idx
                }));
                const { error: achError } = await supabaseClient
                    .from('achievements')
                    .insert(achievementsToInsert);
                if (achError) throw achError;

                document.getElementById('message').innerText = '✅ Сессия опубликована!';
                // Очистить форму
                document.getElementById('sessionDate').value = '';
                document.getElementById('sessionTitle').value = '';
                achievementsBlocks = [];
                nextBlockId = 0;
                renderAllBlocks();
                addAchievementBlock();
                updateCounter();
            } catch (err) {
                console.error(err);
                alert('Ошибка: ' + err.message);
            }
        };

        document.getElementById('addAchievementBtn').onclick = () => addAchievementBlock();

        // Кнопка назад
        document.getElementById('backToMain').onclick = () => {
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
