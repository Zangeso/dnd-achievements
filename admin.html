<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Админка D&D</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
    <div id="admin-panel">
        <h2>Добавить достижение</h2>
        <div id="loading">Загрузка...</div>
        <div id="adminContent" style="display:none;">
            <label>Выберите игрока:</label>
            <select id="playerSelect"></select>
            <input type="text" id="title" placeholder="Название достижения" />
            <input type="file" id="imageFile" accept="image/*" />
            <button id="submitBtn">Опубликовать</button>
            <div id="message"></div>
        </div>
    </div>
    <script>
        // ---------- НАСТРОЙКИ (ЗАМЕНИТЕ НА СВОИ) ----------
        const GROUP_ID = 236712001;        // положительный ID группы
        const ALBUM_ID = 310403391;        // ID альбома
        const STORAGE_KEY = 'dnd_achievements';
        const APP_ID = ВАШ_ID_ПРИЛОЖЕНИЯ;   // ID вашего Mini App (число)
        // -------------------------------------------------

        vkBridge.send('VKWebAppInit');

        let accessToken = null;

        // Запрашиваем токен с нужными правами
        async function getToken() {
            try {
                const result = await vkBridge.send('VKWebAppGetAuthToken', {
                    app_id: APP_ID,
                    scope: 'photos,storage,groups'
                });
                accessToken = result.access_token;
                return accessToken;
            } catch (e) {
                console.error('Ошибка получения токена:', e);
                alert('Не удалось получить доступ. Пожалуйста, разрешите запрошенные права.');
                throw e;
            }
        }

        // Универсальный вызов метода API с токеном
        async function callApi(method, params = {}) {
            if (!accessToken) await getToken();
            params.access_token = accessToken;
            params.v = '5.131';
            const result = await vkBridge.send('VKWebAppCallAPIMethod', {
                method: method,
                params: params
            });
            return result.response;
        }

        // Загрузка списка участников группы
        async function loadGroupMembers() {
            try {
                const members = await callApi('groups.getMembers', {
                    group_id: GROUP_ID,
                    fields: 'first_name,last_name',
                    count: 200
                });
                return members.items.map(m => ({
                    name: `${m.first_name} ${m.last_name}`,
                    id: m.id
                }));
            } catch (e) {
                console.error('Ошибка загрузки участников:', e);
                alert('Не удалось загрузить список игроков. Убедитесь, что вы разрешили доступ.');
                return [];
            }
        }

        // Заполнить выпадающий список
        async function initAdmin() {
            document.getElementById('loading').innerText = 'Запрашиваем доступ...';
            try {
                await getToken();
                document.getElementById('loading').innerText = 'Загружаем список игроков...';
                const members = await loadGroupMembers();
                if (members.length === 0) {
                    document.getElementById('loading').innerText = 'Список игроков пуст или недоступен.';
                    return;
                }
                const select = document.getElementById('playerSelect');
                select.innerHTML = '';
                members.forEach(m => {
                    const option = document.createElement('option');
                    option.value = m.id;
                    option.textContent = m.name;
                    select.appendChild(option);
                });
                document.getElementById('loading').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
            } catch (err) {
                document.getElementById('loading').innerText = 'Ошибка: ' + err.message;
            }
        }

        // Публикация достижения
        document.getElementById('submitBtn').onclick = async () => {
            const title = document.getElementById('title').value;
            const playerId = document.getElementById('playerSelect').value;
            const playerName = document.getElementById('playerSelect').options[document.getElementById('playerSelect').selectedIndex].text;
            const file = document.getElementById('imageFile').files[0];

            if (!title || !file) {
                alert('Заполните название и выберите картинку');
                return;
            }

            try {
                // 1. Получаем сервер для загрузки фото
                const uploadData = await callApi('photos.getUploadServer', {
                    group_id: GROUP_ID,
                    album_id: ALBUM_ID
                });
                const uploadUrl = uploadData.upload_url;

                // 2. Загружаем файл
                const formData = new FormData();
                formData.append('file', file);
                const uploadResponse = await fetch(uploadUrl, {
                    method: 'POST',
                    body: formData
                });
                const uploadResult = await uploadResponse.json();

                // 3. Сохраняем фото в альбоме
                const saveResult = await callApi('photos.save', {
                    group_id: GROUP_ID,
                    album_id: ALBUM_ID,
                    server: uploadResult.server,
                    photos_list: uploadResult.photos_list,
                    hash: uploadResult.hash
                });
                const photo = saveResult[0];
                const photoUrl = photo.sizes[photo.sizes.length-1].url;

                // 4. Получаем текущие достижения из Storage
                const storageRes = await vkBridge.send('VKWebAppStorageGet', { keys: [STORAGE_KEY] });
                let achievements = [];
                if (storageRes.keys[0] && storageRes.keys[0].value) {
                    achievements = JSON.parse(storageRes.keys[0].value);
                }

                // 5. Добавляем новое
                achievements.push({
                    title: title,
                    playerName: playerName,
                    playerId: parseInt(playerId),
                    photoUrl: photoUrl,
                    timestamp: Date.now()
                });

                // 6. Сохраняем обратно в Storage
                await vkBridge.send('VKWebAppStorageSet', {
                    key: STORAGE_KEY,
                    value: JSON.stringify(achievements)
                });

                document.getElementById('message').innerText = '✅ Достижение опубликовано!';
                document.getElementById('title').value = '';
                document.getElementById('imageFile').value = '';
            } catch (err) {
                console.error(err);
                alert('Ошибка: ' + (err.message || err));
            }
        };

        // Запускаем
        initAdmin();
    </script>
</body>
</html>
