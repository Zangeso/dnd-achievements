<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>D&D Достижения</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <div id="header">
            <h1>🏆 Достижения</h1>
            <div id="adminButton" style="display:none;">
                <a href="admin.html">⚙️</a>
            </div>
        </div>
        <div id="sessionsList"></div>
    </div>
    <script>
        const SUPABASE_URL = 'https://jrwgibmbjaoogsdnukzi.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UjoyHMlGvIvQMxKTENAUMQ_OE3GtvON';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const ADMIN_VK_ID = 162536789;

        vkBridge.send('VKWebAppInit');

        // Проверка администратора для шестерёнки
        async function checkAdmin() {
            try {
                const user = await vkBridge.send('VKWebAppGetUserInfo');
                if (user.id === ADMIN_VK_ID) {
                    document.getElementById('adminButton').style.display = 'block';
                }
            } catch (e) {
                console.error(e);
            }
        }

        // Загрузка всех сессий и достижений
        async function loadSessionsWithAchievements() {
            // 1. Получаем все сессии, сортируем по дате (новые сверху)
            const { data: sessions, error: sessionsError } = await supabaseClient
                .from('sessions')
                .select('*')
                .order('session_date', { ascending: false });
            if (sessionsError) {
                console.error('Ошибка загрузки сессий:', sessionsError);
                return [];
            }

            // 2. Получаем все достижения
            const { data: achievements, error: achError } = await supabaseClient
                .from('achievements')
                .select('*')
                .order('order', { ascending: true });
            if (achError) {
                console.error('Ошибка загрузки достижений:', achError);
                return [];
            }

            // 3. Группируем достижения по session_id
            const grouped = {};
            achievements.forEach(ach => {
                if (!grouped[ach.session_id]) grouped[ach.session_id] = [];
                grouped[ach.session_id].push(ach);
            });

            // 4. Соединяем сессии с достижениями
            return sessions.map(session => ({
                ...session,
                achievements: grouped[session.id] || []
            }));
        }

        // Отображение сессий сеткой
        async function renderSessions() {
            const sessions = await loadSessionsWithAchievements();
            const container = document.getElementById('sessionsList');
            container.innerHTML = '';

            sessions.forEach(session => {
                // Блок сессии
                const sessionDiv = document.createElement('div');
                sessionDiv.className = 'session-block';

                // Заголовок сессии
                const titleDiv = document.createElement('div');
                titleDiv.className = 'session-title';
                // Форматируем дату: из ISO в DD.MM.YYYY
                const date = new Date(session.session_date);
                const formattedDate = date.toLocaleDateString('ru-RU');
                titleDiv.textContent = session.title || `Сессия ${formattedDate}`;
                sessionDiv.appendChild(titleDiv);

                // Сетка достижений
                const gridDiv = document.createElement('div');
                gridDiv.className = 'achievements-grid';
                session.achievements.forEach(ach => {
                    const card = document.createElement('div');
                    card.className = 'achievement-card-grid';

                    // Картинка (единый размер)
                    const img = document.createElement('img');
                    img.src = ach.image_url;
                    img.className = 'achievement-img-grid';
                    img.onclick = () => vkBridge.send('VKWebAppShowImages', { images: [ach.image_url] });
                    img.onerror = () => { img.src = 'https://via.placeholder.com/200?text=No+Image'; };

                    // Имя игрока + текст достижения
                    const playerName = document.createElement('div');
                    playerName.className = 'player-name';
                    playerName.innerHTML = `<a href="https://vk.com/id${ach.player_vk_id}" target="_blank">${ach.player_name}</a>`;
                    
                    const achText = document.createElement('div');
                    achText.className = 'achievement-text';
                    achText.textContent = ach.achievement_text;

                    card.appendChild(img);
                    card.appendChild(playerName);
                    card.appendChild(achText);
                    gridDiv.appendChild(card);
                });
                sessionDiv.appendChild(gridDiv);
                container.appendChild(sessionDiv);
            });
        }

        checkAdmin();
        renderSessions();
    </script>
</body>
</html>
