<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>D&D Достижения</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <div id="header">
            <h1>🏆 Достижения</h1>
            <div id="adminButton" style="display:none;">
                <a href="admin.html">⚙️</a>
            </div>
        </div>
        <div id="sessionsList"></div>
    </div>
    <script>
        const SUPABASE_URL = 'https://jrwgibmbjaoogsdnukzi.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UjoyHMlGvIvQMxKTENAUMQ_OE3GtvON';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const ADMIN_VK_ID = 162536789;
        let currentUserId = null;

        vkBridge.send('VKWebAppInit').then(() => {
            return vkBridge.send('VKWebAppGetUserInfo');
        }).then(user => {
            currentUserId = user.id;
            if (currentUserId === ADMIN_VK_ID) {
                document.getElementById('adminButton').style.display = 'block';
            }
            renderSessions();
        }).catch(err => console.error(err));

        async function loadSessionsWithAchievements() {
            const { data: sessions, error: sessionsError } = await supabaseClient
                .from('sessions')
                .select('*')
                .order('session_date', { ascending: false });

            if (sessionsError) {
                console.error('Ошибка загрузки сессий:', sessionsError);
                return [];
            }

            const sessionsWithAchievements = await Promise.all(sessions.map(async (session) => {
                const { data: achievements, error: achError } = await supabaseClient
                    .from('achievements')
                    .select('*')
                    .eq('session_id', session.id)
                    .order('order', { ascending: true });

                if (achError) {
                    console.error(`Ошибка загрузки достижений для сессии ${session.id}:`, achError);
                    return { ...session, achievements: [] };
                }
                return { ...session, achievements };
            }));

            return sessionsWithAchievements;
        }

        async function deleteSession(sessionId) {
            if (!confirm('Удалить сессию и все её достижения? Это действие нельзя отменить.')) return;

            try {
                // 1. Получаем все достижения сессии, чтобы потом удалить картинки
                const { data: achievements, error: fetchError } = await supabaseClient
                    .from('achievements')
                    .select('image_url')
                    .eq('session_id', sessionId);
                if (fetchError) throw fetchError;

                // 2. Удаляем картинки из Storage
                const storagePromises = achievements.map(async (ach) => {
                    // Из URL вырезаем имя файла
                    const url = ach.image_url;
                    const fileName = url.split('/').pop();
                    if (fileName) {
                        await supabaseClient.storage
                            .from('achievements')
                            .remove([fileName]);
                    }
                });
                await Promise.all(storagePromises);

                // 3. Удаляем сессию (достижения удалятся каскадно)
                const { error: deleteError } = await supabaseClient
                    .from('sessions')
                    .delete()
                    .eq('id', sessionId);
                if (deleteError) throw deleteError;

                // 4. Обновляем ленту
                renderSessions();
                alert('Сессия удалена');
            } catch (err) {
                console.error('Ошибка удаления:', err);
                alert('Ошибка удаления: ' + err.message);
            }
        }

        async function renderSessions() {
            const container = document.getElementById('sessionsList');
            container.innerHTML = '<div class="loading">Загрузка...</div>';

            const sessions = await loadSessionsWithAchievements();

            if (!sessions.length) {
                container.innerHTML = '<div class="empty">Пока нет сессий с достижениями</div>';
                return;
            }

            container.innerHTML = '';

            sessions.forEach(session => {
                const sessionBlock = document.createElement('div');
                sessionBlock.className = 'session-block';

                // Заголовок сессии с кнопкой удаления (только для админа)
                const sessionHeader = document.createElement('div');
                sessionHeader.className = 'session-header';
                const formattedDate = new Date(session.session_date).toLocaleDateString('ru-RU');
                sessionHeader.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>📅 Сессия ${formattedDate}</h2>
                        ${currentUserId === ADMIN_VK_ID ? `<button class="delete-session-btn" data-id="${session.id}">🗑️</button>` : ''}
                    </div>
                `;
                if (session.title && session.title !== `Сессия ${formattedDate}`) {
                    sessionHeader.innerHTML += `<p class="session-title">${escapeHtml(session.title)}</p>`;
                }
                sessionBlock.appendChild(sessionHeader);

                // Сетка достижений
                const grid = document.createElement('div');
                grid.className = 'achievements-grid';

                session.achievements.forEach(ach => {
                    const card = document.createElement('div');
                    card.className = 'achievement-card';

                    const img = document.createElement('img');
                    img.src = ach.image_url;
                    img.className = 'achievement-img';
                    img.onclick = () => vkBridge.send('VKWebAppShowImages', { images: [ach.image_url] });
                    img.onerror = () => { img.src = 'https://via.placeholder.com/200?text=No+Image'; };

                    const playerName = document.createElement('div');
                    playerName.className = 'player-name';
                    playerName.innerHTML = `<a href="https://vk.com/id${ach.player_vk_id}" target="_blank">${escapeHtml(ach.player_name)}</a>`;

                    const text = document.createElement('div');
                    text.className = 'achievement-text';
                    text.textContent = ach.achievement_text;

                    card.appendChild(img);
                    card.appendChild(playerName);
                    card.appendChild(text);
                    grid.appendChild(card);
                });

                sessionBlock.appendChild(grid);
                container.appendChild(sessionBlock);
            });

            // Навешиваем обработчики на кнопки удаления
            document.querySelectorAll('.delete-session-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.getAttribute('data-id');
                    deleteSession(id);
                });
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
