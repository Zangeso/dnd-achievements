<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>D&D Достижения</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <div id="header">
            <h1>🏆 Достижения</h1>
            <div id="adminButton" style="display:none;">
                <a href="admin.html">⚙️</a>
            </div>
        </div>
        <div id="achievementsList"></div>
    </div>
    <script>
        const SUPABASE_URL = 'https://jrwgibmbjaoogsdnukzi.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UjoyHMlGvIvQMxKTENAUMQ_OE3GtvON';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const ADMIN_VK_ID = 162536789;

        vkBridge.send('VKWebAppInit');

        async function checkAdmin() {
            try {
                const user = await vkBridge.send('VKWebAppGetUserInfo');
                if (user.id === ADMIN_VK_ID) {
                    document.getElementById('adminButton').style.display = 'block';
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function loadAchievements() {
            const { data, error } = await supabaseClient
                .from('achievements')
                .select('*')
                .order('created_at', { ascending: false });
            if (error) {
                console.error(error);
                return [];
            }
            return data;
        }

        async function renderList() {
            const achievements = await loadAchievements();
            const container = document.getElementById('achievementsList');
            container.innerHTML = '';
            achievements.forEach(ach => {
                const card = document.createElement('div');
                card.className = 'achievement-card';
                const img = document.createElement('img');
                img.src = ach.image_url;
                img.className = 'achievement-img';
                img.onclick = () => vkBridge.send('VKWebAppShowImages', { images: [ach.image_url] });
                const title = document.createElement('h3');
                title.textContent = ach.title;
                const player = document.createElement('p');
                player.innerHTML = `Игрок: <a href="https://vk.com/id${ach.player_vk_id}" target="_blank">${ach.player_name}</a>`;
                card.appendChild(img);
                card.appendChild(title);
                card.appendChild(player);
                container.appendChild(card);
            });
        }

        checkAdmin();
        renderList();
    </script>
</body>
</html>
